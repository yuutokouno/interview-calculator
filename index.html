<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電卓</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .calculator {
            background-color: #333;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        #display {
            width: 100%;
            height: 60px;
            font-size: 2em;
            text-align: right;
            margin-bottom: 10px;
            padding: 5px;
            background-color: #eee;
            border: none;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button {
            width: 100%;
            padding: 15px;
            font-size: 1.2em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #ddd;
        }
        .operator {
            background-color: #f1a33c;
            color: white;
        }
        .operator:hover {
            background-color: #d9912c;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" id="display" readonly>
        <div class="buttons">
            <button data-testid="btn-clear">C</button>
            <button data-testid="btn-paren-left">(</button>
            <button data-testid="btn-paren-right">)</button>
            <button data-testid="btn-divide" class="operator">/</button>
            <button data-testid="btn-7">7</button>
            <button data-testid="btn-8">8</button>
            <button data-testid="btn-9">9</button>
            <button data-testid="btn-multiply" class="operator">×</button>
            <button data-testid="btn-4">4</button>
            <button data-testid="btn-5">5</button>
            <button data-testid="btn-6">6</button>
            <button data-testid="btn-subtract" class="operator">-</button>
            <button data-testid="btn-1">1</button>
            <button data-testid="btn-2">2</button>
            <button data-testid="btn-3">3</button>
            <button data-testid="btn-add" class="operator">+</button>
            <button data-testid="btn-0">0</button>
            <button data-testid="btn-dot">.</button>
            <button data-testid="btn-backspace">←</button>
            <button data-testid="btn-equals" class="operator">=</button>
        </div>
    </div>
    <script>
    </script>
</body>
</html>
